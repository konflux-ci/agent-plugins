# Test scenarios for architecture skill
# Validates that agents actually clone and read from the canonical repos

skill_name: architecture
description: Tests that agents retrieve real content from konflux-ci/architecture and konflux-ci/docs

test_scenarios:
  - name: adr-component-model-ownership
    description: Agent should clone the architecture repo and read ADR-0056 to find specific ownership details
    prompt: "I want to propose changes to the Konflux component model. Clone the architecture repo and check for any prior ADRs on this topic. Tell me what was decided."
    model: sonnet
    samples: 3
    expected:
      contains_keywords:
        - ["ADR", "0056"]
        - ["build-service owns", "Component API", "Group API", "ComponentGroup"]
      does_not_contain: []
    baseline_failure: "Agent describes ADRs generically without reading actual content"

  - name: integration-service-controllers
    description: Agent should read the integration service doc and list its specific controllers
    prompt: "What are the specific controllers that make up the Konflux integration service? Clone the architecture repo and read integration-service.md to find out."
    model: sonnet
    samples: 3
    expected:
      contains_keywords:
        - ["Snapshot Controller", "snapshot controller", "SnapshotController"]
        - ["StatusReport", "status report", "statusreport"]
      does_not_contain: []
    baseline_failure: "Agent gives generic description without naming specific controllers"

  - name: build-request-annotations
    description: Agent should read the docs repo and find specific build configuration annotations
    prompt: "In Konflux, what annotation do I set on a Component to reconfigure its build pipeline? Clone the docs repo and find the exact annotation key and value."
    model: sonnet
    samples: 3
    expected:
      contains_keywords:
        - build.appstudio.openshift.io/request
        - configure-pac
      does_not_contain: []
    baseline_failure: "Agent cannot provide exact annotation without reading docs"

  - name: integration-test-resolver-config
    description: Agent should find specific integration test configuration detail from docs
    prompt: "In Konflux, when creating an integration test, what do I set ResourceKind to if I want to customize pipeline timeouts? Clone the docs repo and check the testing module."
    model: sonnet
    samples: 3
    expected:
      contains_keywords:
        - ["pipelinerun", "PipelineRun"]
        - ["ResolverRef", "resolverref", "ResourceKind", "resourceKind"]
      does_not_contain: []
    baseline_failure: "Agent cannot provide exact field and value without reading docs"

  - name: build-service-crds
    description: Agent should read the build service architecture doc and identify its CRDs
    prompt: "What CRDs does the Konflux build service own? Clone the architecture repo and read build-service.md to find out."
    model: sonnet
    samples: 3
    expected:
      contains_keywords:
        - Component
        - Repository
      does_not_contain: []
    baseline_failure: "Agent guesses CRD names from general knowledge instead of reading the doc"
